openapi: 3.0.3
info:
  title: AMP API
  version: 1.0
  description: "REST API for the AMP (Autonomous Multi-agent Platform). Integrate your agents with AMP to get transparency, accountability, and human oversight (HITL) for governed AI agent operations."
servers:
  -
    url: "https://api.amp.example.com"
    description: Production (placeholder)
  -
    url: "http://localhost:5000"
    description: Local development
tags:
  -
    name: Admin / Ops
    description: Administrative and operator APIs.
  -
    name: Agent Lifecycle
    description: "Agent registration, launch, polling, and lifecycle operations."
  -
    name: Analytics
    description: Analytics and dashboard query APIs.
  -
    name: Auth / Sessions
    description: Authentication and session-related APIs.
  -
    name: Dashboard
    description: Dashboard-facing APIs (generally non-customer integration surface).
  -
    name: Frontend Shell
    description: Frontend SPA shell routes.
  -
    name: HITL
    description: Human-in-the-loop routing and decision APIs.
  -
    name: Internal
    description: Internal service-to-service APIs.
  -
    name: LLM Utilities
    description: Prompt classification and utility APIs.
  -
    name: Log Proxy
    description: Agent log ingestion and proxy APIs.
  -
    name: Ops Utilities
    description: Operational refresh/streaming utility APIs.
  -
    name: Presence
    description: User presence and heartbeat APIs.
  -
    name: RLHF
    description: "RLHF policy, runtime, and decision management APIs."
  -
    name: User Profile
    description: End-user profile management APIs.
  -
    name: Workitems
    description: Work item queue and status APIs for human review.
  -
    name: Worktray
    description: Worktray-facing interactive APIs.
paths:
  /:
    get:
      summary: Spa Index
      description: "Serve static files from frontend/dist; fallback to index.html for SPA routes.\n\nIf the build output is missing, return a friendly message suggesting to\nrun `npm run build` in the frontend directory."
      operationId: get_spa_index_
      tags:
        - Frontend Shell
      responses:
        200:
          description: Success
        400:
          description: Bad request
        401:
          description: Unauthorized
        500:
          description: Server error
