openapi: 3.0.3
info:
  title: AMP API
  version: 1.0
  description: "REST API for the AMP (Autonomous Multi-agent Platform). Integrate your agents with AMP to get transparency, accountability, and human oversight (HITL) for governed AI agent operations."
servers:
  -
    url: "https://api.amp.example.com"
    description: Production (placeholder)
  -
    url: "http://localhost:5000"
    description: Local development
tags:
  -
    name: Agent Lifecycle
    description: "Agent registration, launch, polling, and lifecycle operations."
  -
    name: Analytics
    description: Analytics and dashboard query APIs.
  -
    name: Auth / Sessions
    description: Authentication and session-related APIs.
  -
    name: HITL
    description: Human-in-the-loop routing and decision APIs.
  -
    name: Log Proxy
    description: Agent log ingestion and proxy APIs.
  -
    name: RLHF
    description: "RLHF policy, runtime, and decision management APIs."
  -
    name: Workitems
    description: Work item queue and status APIs for human review.
paths:
